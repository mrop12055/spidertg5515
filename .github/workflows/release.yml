name: Release Windows Desktop

# Builds a Windows installer with electron-builder and uploads the EXE/update
# files to the exact GitHub tag release that triggered this workflow.
#
# Usage:
#   1. Bump "version" in package.json.
#   2. Tag a commit:  git tag v0.1.3 && git push --tags
#   3. This workflow runs and attaches the installer to that same release.
#
# Prerequisites (one-time):
#   - Set "build.publish.owner" and "build.publish.repo" in package.json to
#     match this repository.
#   - GITHUB_TOKEN is provided automatically; no secrets to add.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Add electron-builder
        run: bun add -d electron-builder

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Download embedded Python (python-build-standalone)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $url = "https://github.com/astral-sh/python-build-standalone/releases/download/20240814/cpython-3.11.9+20240814-x86_64-pc-windows-msvc-install_only.tar.gz"
          $dst = "resources/python"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          curl.exe -L -o python.tar.gz $url
          tar -xzf python.tar.gz
          # Archive extracts to a top-level `python/` folder — move its contents into resources/python
          Get-ChildItem -Path "python" -Force | Move-Item -Destination $dst -Force
          Remove-Item -Recurse -Force python
          Remove-Item python.tar.gz
          if (!(Test-Path "$dst/python.exe")) { throw "python.exe not found after extract" }

      - name: Pre-install runner deps into vendor dir
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          resources/python/python.exe -m pip install --disable-pip-version-check `
            --target resources/runner/_vendor -r resources/runner/requirements.txt
          New-Item -ItemType File -Path resources/runner/_vendor/.installed -Force | Out-Null

      - name: Build renderer
        run: bun run build

      - name: Build Windows installer
        run: npx electron-builder --win nsis portable --publish never

      - name: Upload installer to this GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          make_latest: true
          files: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap

      - name: Upload manual build artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: TelegramCRM-Windows
          path: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap
